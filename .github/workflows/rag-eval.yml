name: RAG Evaluation

on:
  pull_request:
    branches: [main]
    types: [labeled]

# Only run when the 'eval' label is added to a PR
# This prevents evaluation on every commit — it only fires when you explicitly
# label a PR with 'eval'.

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Gate: Skip everything unless the triggering label is 'eval'
  # ──────────────────────────────────────────────────────────────────────────
  check-label:
    name: Check for eval label
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check label
        id: check
        run: |
          if [ "${{ github.event.label.name }}" = "eval" ]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Ingest — build & cache the vector store
  # (skipped entirely on cache hit, so typically <35s)
  # ──────────────────────────────────────────────────────────────────────────
  ingest:
    name: Ingest Evaluation Repos
    needs: check-label
    if: needs.check-label.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-eval-${{ hashFiles('requirements-eval.txt') }}
          restore-keys: pip-eval-

      - name: Install Python dependencies
        run: pip install -r requirements-eval.txt

      - name: Cache eval vector store
        uses: actions/cache@v4
        id: chroma-cache
        with:
          path: tests/evals/eval_data
          key: chromadb-eval-${{ hashFiles('tests/evals/ingest_repos.py') }}

      - name: Install Ollama
        if: steps.chroma-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://ollama.ai/install.sh | sh

      - name: Start Ollama and pull embedding model
        if: steps.chroma-cache.outputs.cache-hit != 'true'
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done
          ollama pull nomic-embed-text

      - name: Ingest evaluation repos
        if: steps.chroma-cache.outputs.cache-hit != 'true'
        working-directory: tests/evals
        run: python ingest_repos.py

      - name: Upload vector store artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromadb-data
          path: tests/evals/eval_data/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Evaluate — the heavy lifting, now with parallelism + warm-up
  # ──────────────────────────────────────────────────────────────────────────
  evaluate:
    name: Evaluate RAG Quality
    needs: ingest
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-eval-${{ hashFiles('requirements-eval.txt') }}
          restore-keys: pip-eval-

      - name: Install Python dependencies
        run: pip install -r requirements-eval.txt

      - name: Download vector store artifact
        uses: actions/download-artifact@v4
        with:
          name: chromadb-data
          path: tests/evals/eval_data

      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh

      # Static key — models never re-download once cached
      - name: Cache Ollama models
        uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/.ollama/models
          key: ollama-eval-models-v1

      # FIX: Only pull models that are not already present in the cache.
      # Avoids the ~45s re-check overhead on every run even when cache hits.
      - name: Start Ollama and pull inference models
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done
          ollama list | grep -q "nomic-embed-text" || ollama pull nomic-embed-text
          ollama list | grep -q "llama3.2:3b"      || ollama pull llama3.2:3b
          ollama list | grep -q "qwen2.5:3b"       || ollama pull qwen2.5:3b

      # FIX: Pre-warm both inference models before DeepEval starts.
      # First inference call has a cold-start penalty; warming here prevents
      # that latency from inflating per-test timings.
      - name: Pre-warm inference models
        run: |
          curl -s http://localhost:11434/api/generate \
            -d '{"model":"llama3.2:3b","prompt":"hi","stream":false}' > /dev/null
          curl -s http://localhost:11434/api/generate \
            -d '{"model":"qwen2.5:3b","prompt":"hi","stream":false}' > /dev/null

      # FIX: --workers 4 runs test cases concurrently against Ollama.
      # This is the single biggest speedup — previously all cases ran serially.
      # Tune the worker count up/down based on how many test cases you have.
      - name: Run DeepEval RAG evaluation
        id: eval
        working-directory: tests/evals
        run: |
          deepeval test run test_rag_pipeline.py \
            --verbose \
            --workers 4 \
            2>&1 | tee eval_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-results
          path: |
            tests/evals/eval_results.json
            tests/evals/eval_output.txt

      - name: Comment PR with eval results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let resultsText = '⚠️ Could not load eval results.';
            let passed = false;

            try {
              const results = JSON.parse(fs.readFileSync('tests/evals/eval_results.json', 'utf8'));
              const total = results.total_tests || 0;
              const exitStatus = results.exit_status;
              passed = exitStatus === 0;

              const statusIcon = passed ? '✅' : '❌';
              const statusText = passed ? 'PASSED' : 'FAILED';

              let table = '| Test Case | Answer Relevancy | Contextual Recall | Contextual Relevancy |\n|-----------|:---:|:---:|:---:|\n';

              if (results.results) {
                for (const r of results.results) {
                  const ar = r.scores?.AnswerRelevancyMetric;
                  const cr = r.scores?.ContextualRecallMetric;
                  const cv = r.scores?.ContextualRelevancyMetric;
                  const fmt = (m) => {
                    if (!m || m.score === null) return '—';
                    const icon = m.score >= m.threshold ? '✅' : '❌';
                    return `${icon} ${(m.score * 100).toFixed(0)}%`;
                  };
                  table += `| \`${r.id}\` | ${fmt(ar)} | ${fmt(cr)} | ${fmt(cv)} |\n`;
                }
              }

              resultsText = `## ${statusIcon} RAG Evaluation ${statusText}\n\n**${total} test cases** evaluated with fully local models.\n\n| Component | Model |\n|-----------|-------|\n| Embeddings | \`nomic-embed-text\` |\n| Generator | \`llama3.2:3b\` |\n| Judge | \`qwen2.5:3b\` |\n\n| Metric | Threshold |\n|--------|:---------:|\n| Answer Relevancy | 50% |\n| Contextual Recall | 40% |\n| Contextual Relevancy | 40% |\n\n### Results\n\n${table}\n`;
            } catch (err) {
              resultsText = `## ⚠️ RAG Evaluation\n\nCould not parse results: ${err.message}`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('RAG Evaluation'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: botComment.id, body: resultsText,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: resultsText,
              });
            }

      - name: Check eval result
        if: always()
        run: |
          EXIT_CODE="${{ steps.eval.outputs.exit_code }}"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ RAG evaluation failed — PR should not be merged."
            exit 1
          else
            echo "✅ RAG evaluation passed — PR is safe to merge."
          fi
