name: RAG Evaluation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  rag-eval:
    name: RAG Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-eval-${{ hashFiles('requirements-eval.txt') }}
          restore-keys: pip-eval-

      - name: Install Python dependencies
        run: pip install -r requirements-eval.txt

      # ── 3. Ollama setup ──
      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh

      - name: Cache Ollama models
        uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/.ollama/models
          key: ollama-eval-models-v1

      - name: Start Ollama and pull models
        run: |
          # Start server in background
          ollama serve &

          # Wait for server
          echo "Waiting for Ollama..."
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done
          echo "Ollama is ready!"

          # Pull all 3 models (skips if cached)
          echo "Pulling nomic-embed-text..."
          ollama pull nomic-embed-text

          echo "Pulling llama3.2:3b..."
          ollama pull llama3.2:3b

          echo "Pulling qwen2.5:3b..."
          ollama pull qwen2.5:3b

          echo "Models available:"
          ollama list

      # ── 4. Cache eval ChromaDB data ──
      - name: Cache eval vector store
        uses: actions/cache@v4
        id: chroma-cache
        with:
          path: tests/evals/eval_data
          key: chromadb-eval-${{ hashFiles('tests/evals/ingest_repos.py') }}

      # ── 5. Ingest repos (skip if cached) ──
      - name: Ingest evaluation repos
        if: steps.chroma-cache.outputs.cache-hit != 'true'
        working-directory: tests/evals
        run: python ingest_repos.py

      # ── 6. Run evaluation suite ──
      - name: Run DeepEval RAG evaluation
        id: eval
        working-directory: tests/evals
        run: |
          deepeval test run test_rag_pipeline.py --verbose 2>&1 | tee eval_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # ── 7. Upload results artifact ──
      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-results
          path: |
            tests/evals/eval_results.json
            tests/evals/eval_output.txt

      # ── 8. Comment on PR with results ──
      - name: Comment PR with eval results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let resultsText = '⚠️ Could not load eval results.';
            let passed = false;

            try {
              const results = JSON.parse(
                fs.readFileSync('tests/evals/eval_results.json', 'utf8')
              );
              const total = results.total_tests || 0;
              const exitStatus = results.exit_status;
              passed = exitStatus === 0;

              const statusIcon = passed ? '✅' : '❌';
              const statusText = passed ? 'PASSED' : 'FAILED';

              let table = '| Test Case | Answer Relevancy | Contextual Recall | Contextual Relevancy |\n';
              table += '|-----------|:---:|:---:|:---:|\n';

              if (results.results) {
                for (const r of results.results) {
                  const ar = r.scores?.AnswerRelevancyMetric;
                  const cr = r.scores?.ContextualRecallMetric;
                  const cv = r.scores?.ContextualRelevancyMetric;
                  const fmt = (m) => {
                    if (!m || m.score === null) return '—';
                    const icon = m.score >= m.threshold ? '✅' : '❌';
                    return `${icon} ${(m.score * 100).toFixed(0)}%`;
                  };
                  table += `| \`${r.id}\` | ${fmt(ar)} | ${fmt(cr)} | ${fmt(cv)} |\n`;
                }
              }

              resultsText = `## ${statusIcon} RAG Evaluation ${statusText}\n\n`;
              resultsText += `**${total} test cases** evaluated with fully local models.\n\n`;
              resultsText += `| Component | Model |\n|-----------|-------|\n`;
              resultsText += `| Embeddings | \`nomic-embed-text\` |\n`;
              resultsText += `| Generator | \`llama3.2:3b\` |\n`;
              resultsText += `| Judge | \`qwen2.5:3b\` |\n\n`;
              resultsText += `| Metric | Threshold |\n|--------|:---------:|\n`;
              resultsText += `| Answer Relevancy | 50% |\n`;
              resultsText += `| Contextual Recall | 40% |\n`;
              resultsText += `| Contextual Relevancy | 40% |\n\n`;
              resultsText += `### Results\n\n${table}\n`;
            } catch (err) {
              resultsText = `## ⚠️ RAG Evaluation\n\nCould not parse results: ${err.message}`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('RAG Evaluation'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: botComment.id, body: resultsText,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: resultsText,
              });
            }

      # ── 9. Gate the PR ──
      - name: Check eval result
        if: always()
        run: |
          EXIT_CODE="${{ steps.eval.outputs.exit_code }}"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ RAG evaluation failed — PR should not be merged."
            exit 1
          else
            echo "✅ RAG evaluation passed — PR is safe to merge."
          fi
